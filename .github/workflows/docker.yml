name: Mirror Plane Images

on:
  workflow_dispatch:


jobs:

  mirror:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write


    steps:

    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Mirror images
      run: |

        images="
        makeplane/plane-backend:latest
        makeplane/plane-frontend:latest
        makeplane/plane-admin:latest
        makeplane/plane-live:latest
        makeplane/plane-space:latest
        makeplane/plane-worker:latest
        makeplane/plane-proxy:latest
        postgres:15
        redis:7
        minio/minio:latest
        "


        for image in $images
        do

          echo "===================="
          echo "Pull $image"
          echo "===================="

          docker pull $image


          new_name=$(echo $image | \
          sed 's/\//-/g' | \
          sed 's/:/-/g')


          echo "Push ghcr.io/${{ github.repository_owner }}/$new_name"


          docker tag \
          $image \
          ghcr.io/${{ github.repository_owner }}/$new_name


          docker push \
          ghcr.io/${{ github.repository_owner }}/$new_name


        done
