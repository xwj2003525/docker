name: Mirror Plane Image

on:
  workflow_dispatch:

jobs:

  mirror:

    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:

    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Pull Plane image
      run: |
        docker pull makeplane/plane-backend:stable


    - name: Tag image
      run: |
        docker tag \
        makeplane/plane-backend:stable \
        ghcr.io/${{ github.repository_owner }}/plane-backend:stable


    - name: Push image
      run: |
        docker push \
        ghcr.io/${{ github.repository_owner }}/plane-backend:stable
