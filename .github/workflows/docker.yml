name: Mirror Plane Image

on:
  workflow_dispatch:
    inputs:

      image:
        description: "image name"
        required: true
        default: "plane-live"


jobs:

  mirror:

    runs-on: ubuntu-latest

    permissions:
      packages: write


    steps:

    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Mirror
      run: |
    
        case "${{ github.event.inputs.image }}" in
    
        plane-live)
          IMAGE=makeplane/plane-live:latest
          NAME=plane-live
          ;;
    
        plane-backend)
          IMAGE=makeplane/plane-backend:latest
          NAME=plane-backend
          ;;
    
        plane-worker)
          IMAGE=makeplane/plane-worker:latest
          NAME=plane-worker
          ;;
    
        plane-space)
          IMAGE=makeplane/plane-space:latest
          NAME=plane-space
          ;;
    
        plane-web)
          IMAGE=makeplane/plane-web:latest
          NAME=plane-web
          ;;
    
        plane-admin)
          IMAGE=makeplane/plane-admin:latest
          NAME=plane-admin
          ;;
    
        plane-proxy)
          IMAGE=makeplane/plane-proxy:latest
          NAME=plane-proxy
          ;;
    
        *)
          echo "unknown image"
          exit 1
          ;;
    
        esac
    
    
        docker pull $IMAGE
    
    
        docker tag \
        $IMAGE \
        ghcr.io/${{ github.repository_owner }}/$NAME:latest
    
    
        docker push \
        ghcr.io/${{ github.repository_owner }}/$NAME:latest
